{% extends "base.html" %}
{% block content %}
<h1>My Meetings</h1>
{% if meetings %}
  <ul>
  {% for meeting in meetings %}
    <li>{{ meeting.title }} — {{ meeting.start_time.strftime('%Y-%m-%d %H:%M') }}</li>
  {% endfor %}
  </ul>
{% else %}
  <p>No upcoming meetings.</p>
{% endif %}
{% endblock %}
